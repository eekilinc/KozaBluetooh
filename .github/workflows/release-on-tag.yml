name: Release on Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore BluetoothDeskApp.sln

      - name: Build
        run: dotnet build BluetoothDeskApp.sln -c Release --no-restore

      - name: Publish EXE
        run: dotnet publish src/BluetoothDeskApp/BluetoothDeskApp.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true -o artifacts/win-x64

      - name: Archive EXE
        run: powershell -Command "Compress-Archive -Path artifacts/win-x64/* -DestinationPath artifacts/KozaBluetooth-win-x64.zip -Force"

      - name: Prepare Turkish release notes
        shell: pwsh
        run: |
          @"
          KozaBluetooth ${env:GITHUB_REF_NAME}

          ## Ozet
          - Windows x64 icin tek dosya EXE paketi eklendi.
          - Bluetooth Classic (HC-05/HC-06) ve BLE destegi bu surumde mevcuttur.

          ## Kurulum
          1. Asagidaki varliklardan KozaBluetooth-win-x64.zip dosyasini indirin.
          2. Zip dosyasini klasore cikartin.
          3. KozaBluetooth.exe dosyasini calistirin.

          ## Notlar
          - Uygulama Windows 10/11 icin hedeflenmistir.
          - HC-05/HC-06 baglantisi icin gerekirse COM veya RFCOMM kullanin.
          "@ | Set-Content -Path artifacts/release-notes.md -Encoding UTF8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: KozaBluetooth ${{ github.ref_name }}
          body_path: artifacts/release-notes.md
          files: artifacts/KozaBluetooth-win-x64.zip
