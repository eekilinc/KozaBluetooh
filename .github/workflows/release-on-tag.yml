name: Release on Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore BluetoothDeskApp.sln

      - name: Build
        run: dotnet build BluetoothDeskApp.sln -c Release --no-restore

      - name: Publish EXE (self-contained)
        run: dotnet publish src/BluetoothDeskApp/BluetoothDeskApp.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:DebugType=None /p:DebugSymbols=false -o artifacts/self-contained

      - name: Publish EXE (lite framework-dependent)
        run: dotnet publish src/BluetoothDeskApp/BluetoothDeskApp.csproj -c Release --self-contained false /p:UseAppHost=true /p:DebugType=None /p:DebugSymbols=false -o artifacts/lite

      - name: Prepare portable EXE files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts/portable -Force | Out-Null
          Copy-Item artifacts/self-contained/KozaBluetooth.exe artifacts/portable/KozaBluetooth.exe -Force
          Compress-Archive -Path artifacts/lite/* -DestinationPath artifacts/portable/KozaBluetooth-lite.zip -Force

      - name: Archive EXE packages
        run: powershell -Command "Compress-Archive -Path artifacts/portable/KozaBluetooth.exe -DestinationPath artifacts/KozaBluetooth-portable.zip -Force"

      - name: Prepare Turkish release notes
        shell: pwsh
        run: |
          @"
          KozaBluetooth ${env:GITHUB_REF_NAME}

          ## Ozet
          - Windows x64 icin kurulum gerektirmeyen tek dosya EXE eklendi.
          - Ek olarak daha kucuk boyutlu framework-dependent KozaBluetooth-lite.zip eklendi.
          - Bluetooth Classic (HC-05/HC-06) ve BLE destegi bu surumde mevcuttur.

          ## Calistirma
          1. KozaBluetooth.exe (self-contained) dosyasini indirip dogrudan calistirabilirsiniz.
          2. KozaBluetooth-lite.zip (kucuk boyut) paketini acip KozaBluetooth.exe dosyasini calistirin.
          3. Lite surum icin sistemde .NET 8 Desktop Runtime kurulu olmalidir.
          4. Alternatif olarak self-contained zip paketini kullanabilirsiniz.

          ## Notlar
          - Uygulama Windows 10/11 icin hedeflenmistir.
          - HC-05/HC-06 baglantisi icin gerekirse COM veya RFCOMM kullanin.
          - Lite surum icin: https://dotnet.microsoft.com/download/dotnet/8.0/runtime
          "@ | Set-Content -Path artifacts/release-notes.md -Encoding UTF8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: KozaBluetooth ${{ github.ref_name }}
          body_path: artifacts/release-notes.md
          files: |
            artifacts/portable/KozaBluetooth.exe
            artifacts/KozaBluetooth-portable.zip
            artifacts/portable/KozaBluetooth-lite.zip
