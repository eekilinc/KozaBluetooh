name: Release on Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore BluetoothDeskApp.sln

      - name: Build
        run: dotnet build BluetoothDeskApp.sln -c Release --no-restore

      - name: Publish EXE
        run: dotnet publish src/BluetoothDeskApp/BluetoothDeskApp.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:DebugType=None /p:DebugSymbols=false -o artifacts/win-x64

      - name: Prepare portable EXE only
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts/portable -Force | Out-Null
          Copy-Item artifacts/win-x64/KozaBluetooth.exe artifacts/portable/KozaBluetooth.exe -Force

      - name: Archive EXE
        run: powershell -Command "Compress-Archive -Path artifacts/portable/KozaBluetooth.exe -DestinationPath artifacts/KozaBluetooth-portable.zip -Force"

      - name: Prepare Turkish release notes
        shell: pwsh
        run: |
          @"
          KozaBluetooth ${env:GITHUB_REF_NAME}

          ## Ozet
          - Windows x64 icin kurulum gerektirmeyen tek dosya EXE eklendi.
          - Bluetooth Classic (HC-05/HC-06) ve BLE destegi bu surumde mevcuttur.

          ## Calistirma
          1. Asagidaki varliklardan KozaBluetooth.exe dosyasini dogrudan indirin.
          2. Dosyayi herhangi bir klasorde calistirin.
          3. Alternatif olarak KozaBluetooth-portable.zip dosyasini indirip acabilirsiniz.

          ## Notlar
          - Uygulama Windows 10/11 icin hedeflenmistir.
          - HC-05/HC-06 baglantisi icin gerekirse COM veya RFCOMM kullanin.
          "@ | Set-Content -Path artifacts/release-notes.md -Encoding UTF8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: KozaBluetooth ${{ github.ref_name }}
          body_path: artifacts/release-notes.md
          files: |
            artifacts/portable/KozaBluetooth.exe
            artifacts/KozaBluetooth-portable.zip
