name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore BluetoothDeskApp.sln

      - name: Build
        run: dotnet build BluetoothDeskApp.sln -c Release --no-restore

      - name: Publish EXE
        run: dotnet publish src/BluetoothDeskApp/BluetoothDeskApp.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true -o artifacts/win-x64

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: KozaBluetooth-win-x64
          path: artifacts/win-x64
